<style>
:root {
  --bg:#FFFFFF;--card:#FFFFFF;--text:#121212;--text-s:#555;--text-m:#6B6B6B;
  --border:#D9D9D9;--border-l:#EEE;--surface:#F7F7F5;
  --accent:#CC1400;--accent-bg:rgba(204,20,0,0.06);
  --font:"Noto Sans JP",sans-serif;--serif:"Noto Serif JP",serif;
  --c1:#CC1400;--c2:#1A6B3C;--c3:#8B5CF6;--c4:#D97706;--c5:#0369A1;
  --c6:#BE185D;--c7:#525252;--c8:#059669;--c9:#7C3AED;--c10:#DC2626;
}
[data-theme="dark"]{
  --bg:#121212;--card:#1A1A1A;--text:#E0E0E0;--text-s:#AAA;--text-m:#8A8A8A;
  --border:#333;--border-l:#2A2A2A;--surface:#1A1A1A;
  --accent:#FF4444;--accent-bg:rgba(255,68,68,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.7;max-width:100%;margin:0 auto;padding:16px 20px}
.back{display:inline-block;margin-bottom:12px;font-size:0.82rem;color:var(--text-s);text-decoration:none}
.back:hover{color:var(--text)}
h1{font-family:var(--serif);font-size:1.4rem;font-weight:700;margin-bottom:4px}
.subtitle{font-size:0.84rem;color:var(--text-s);margin-bottom:8px}
.desc{font-size:0.82rem;color:var(--text);margin-bottom:16px;line-height:1.8;max-width:800px}
.theme-toggle{position:fixed;top:12px;right:12px;background:var(--surface);border:1px solid var(--border);padding:4px 8px;cursor:pointer;font-size:1rem;z-index:100}

/* Tree container */
#tree-container{width:100%;height:calc(100vh - 200px);min-height:600px;border:1px solid var(--border);background:var(--surface);position:relative;overflow:hidden}
#tree-container svg{width:100%;height:100%}

/* Timeline axis */
.time-axis line,.time-axis path{stroke:var(--border)}
.time-axis text{fill:var(--text-m);font-size:10px;font-family:var(--font)}

/* Edges */
.tree-edge{fill:none;stroke-opacity:0.35;stroke-width:1.5}
.tree-edge:hover{stroke-opacity:0.8;stroke-width:2.5}

/* Nodes */
.tree-node circle{stroke:#fff;stroke-width:1;cursor:pointer;transition:r 0.2s}
.tree-node circle:hover{r:7}
.tree-node text{font-family:var(--font);fill:var(--text);pointer-events:none}

/* Tooltip */
.tooltip{position:absolute;background:var(--card);border:1px solid var(--border);padding:10px 14px;font-size:0.78rem;line-height:1.6;pointer-events:none;opacity:0;transition:opacity 0.15s;max-width:300px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.tooltip .tt-name{font-weight:700;font-size:0.85rem;margin-bottom:2px}
.tooltip .tt-meta{color:var(--text-m);font-size:0.72rem}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0;font-size:0.72rem;color:var(--text-m)}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* Controls */
.controls{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.ctrl-btn{padding:3px 10px;font-size:0.72rem;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font);color:var(--text)}
.ctrl-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ctrl-btn:hover{border-color:var(--accent)}
.ctrl-label{font-size:0.72rem;color:var(--text-m);margin-right:4px}

/* Era markers */
.era-band{fill:var(--accent-bg);opacity:0.3}
.era-label{font-size:9px;fill:var(--text-m);font-family:var(--font)}
</style>
</head>

const clusterColors = {0:'#888',1:'#CC1400',2:'#1A6B3C',3:'#8B5CF6',4:'#D97706',5:'#0369A1',6:'#BE185D',7:'#525252',8:'#059669',9:'#7C3AED',10:'#DC2626'};

let currentFilter = 0;

function buildTree(filterClusterId) {
  const container = document.getElementById('tree-container');
  container.innerHTML = '';
  const tooltip = document.getElementById('tooltip');

  const W = container.clientWidth;
  const H = container.clientHeight;
  const margin = {top: 40, right: 40, bottom: 40, left: 60};

  let nodes = treeNodes.map(n => ({...n}));
  let edges = treeEdges.map(e => ({...e}));

  // Filter by cluster
  if (filterClusterId > 0) {
    const clusterNodeIds = new Set(nodes.filter(n => n.cluster === filterClusterId).map(n => n.id));
    // Include connected nodes
    edges.forEach(e => {
      if (clusterNodeIds.has(e.parent)) clusterNodeIds.add(e.child);
      if (clusterNodeIds.has(e.child)) clusterNodeIds.add(e.parent);
    });
    nodes = nodes.filter(n => clusterNodeIds.has(n.id));
    const nids = new Set(nodes.map(n => n.id));
    edges = edges.filter(e => nids.has(e.parent) && nids.has(e.child));
  }

  if (nodes.length === 0) return;

  // Compute children count for node sizing
  const childCount = {};
  edges.forEach(e => { childCount[e.parent] = (childCount[e.parent]||0) + 1; });

  // Time scale (x-axis)
  const minYear = Math.min(...nodes.map(n => n.era_start || 2000));
  const maxYear = Math.max(...nodes.map(n => n.era_start || 2000));
  const xScale = d3.scaleLinear()
    .domain([minYear - 5, maxYear + 5])
    .range([margin.left, W - margin.right]);

  // Assign y positions: group by cluster, then spread within cluster
  const clusterGroups = {};
  nodes.forEach(n => {
    const cl = n.cluster || 0;
    if (!clusterGroups[cl]) clusterGroups[cl] = [];
    clusterGroups[cl].push(n);
  });

  // Sort clusters, assign vertical bands
  const clusterIds = Object.keys(clusterGroups).map(Number).sort((a,b) => a-b);
  const bandHeight = (H - margin.top - margin.bottom) / clusterIds.length;

  const nodeMap = {};
  clusterIds.forEach((cl, ci) => {
    const group = clusterGroups[cl];
    // Sort by era within cluster
    group.sort((a,b) => (a.era_start||2000) - (b.era_start||2000));
    group.forEach((n, ni) => {
      const bandTop = margin.top + ci * bandHeight;
      const ySpread = bandHeight * 0.8;
      const yOffset = bandTop + bandHeight * 0.1;
      // Spread vertically within band, with slight jitter based on era
      const normalizedIndex = group.length > 1 ? ni / (group.length - 1) : 0.5;
      n.x = xScale(n.era_start || 2000);
      n.y = yOffset + normalizedIndex * ySpread;
      nodeMap[n.id] = n;
    });
  });

  const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.3, 5]).on('zoom', e => g.attr('transform', e.transform)));

  // Era bands (decades)
  const decades = [];
  for (let y = Math.floor(minYear/10)*10; y <= maxYear + 10; y += 10) decades.push(y);
  g.selectAll('.era-band').data(decades.filter((_,i) => i%2===0)).join('rect')
    .attr('class','era-band')
    .attr('x', d => xScale(d))
    .attr('y', margin.top - 10)
    .attr('width', d => xScale(d+10) - xScale(d))
    .attr('height', H - margin.top - margin.bottom + 20);

  // Time axis labels
  g.selectAll('.era-label').data(decades).join('text')
    .attr('class','era-label')
    .attr('x', d => xScale(d))
    .attr('y', margin.top - 16)
    .text(d => d);

  // Cluster labels on left
  clusterIds.forEach((cl, ci) => {
    const bandTop = margin.top + ci * bandHeight;
    const clName = {0:'他',1:'交換',2:'構造',3:'儀礼',4:'権力',5:'存在論',6:'STS',7:'方法',8:'医療',9:'移民',10:'自己'}[cl] || '';
    g.append('text')
      .attr('x', 8)
      .attr('y', bandTop + bandHeight/2)
      .attr('font-size', '9px')
      .attr('font-weight', '600')
      .attr('fill', clusterColors[cl] || '#888')
      .attr('font-family', 'var(--font)')
      .attr('dominant-baseline', 'middle')
      .text(clName);

    // Subtle horizontal separator
    if (ci > 0) {
      g.append('line')
        .attr('x1', margin.left)
        .attr('x2', W - margin.right)
        .attr('y1', bandTop)
        .attr('y2', bandTop)
        .attr('stroke', 'var(--border-l)')
        .attr('stroke-dasharray', '3,3')
        .attr('stroke-opacity', 0.5);
    }
  });

  // Draw edges as curved paths (phylogenetic style: horizontal then vertical)
  const edgeData = edges.filter(e => nodeMap[e.parent] && nodeMap[e.child]);
  g.selectAll('.tree-edge').data(edgeData).join('path')
    .attr('class', 'tree-edge')
    .attr('d', d => {
      const p = nodeMap[d.parent];
      const c = nodeMap[d.child];
      // Phylogenetic-style: go right from parent, then curve to child
      const midX = (p.x + c.x) / 2;
      return `M${p.x},${p.y} C${midX},${p.y} ${midX},${c.y} ${c.x},${c.y}`;
    })
    .attr('stroke', d => {
      const p = nodeMap[d.parent];
      return clusterColors[p.cluster] || '#888';
    });

  // Draw nodes
  const nodeGroup = g.selectAll('.tree-node').data(nodes).join('g')
    .attr('class', 'tree-node')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  nodeGroup.append('circle')
    .attr('r', d => Math.sqrt(childCount[d.id] || 0) * 2.5 + 3.5)
    .attr('fill', d => clusterColors[d.cluster] || '#888')
    .attr('opacity', 0.85)
    .on('mouseover', function(event, d) {
      const cc = childCount[d.id] || 0;
      tooltip.innerHTML = `<div class="tt-name">${d.name_ja} (${d.name_en})</div>` +
        `<div class="tt-meta">${d.era_start || '?'}年 | ${d.subfield || ''}</div>` +
        `<div class="tt-meta">C${d.cluster}: ${d.cluster_name} | 派生概念: ${cc}</div>`;
      tooltip.style.opacity = 1;
      tooltip.style.left = (event.pageX + 12) + 'px';
      tooltip.style.top = (event.pageY - 20) + 'px';
      // Highlight connected edges
      g.selectAll('.tree-edge')
        .attr('stroke-opacity', e => (e.parent === d.id || e.child === d.id) ? 0.9 : 0.1)
        .attr('stroke-width', e => (e.parent === d.id || e.child === d.id) ? 3 : 1);
    })
    .on('mouseout', function() {
      tooltip.style.opacity = 0;
      g.selectAll('.tree-edge').attr('stroke-opacity', 0.35).attr('stroke-width', 1.5);
    });

  // Labels for important nodes (many children or early era)
  nodeGroup.filter(d => (childCount[d.id] || 0) >= 2 || (d.era_start && d.era_start < 1930))
    .append('text')
    .attr('dx', d => Math.sqrt(childCount[d.id] || 0) * 2.5 + 6)
    .attr('dy', 3)
    .attr('font-size', d => (childCount[d.id] || 0) >= 3 ? '9px' : '7.5px')
    .attr('font-weight', d => (childCount[d.id] || 0) >= 3 ? '600' : '400')
    .text(d => d.name_ja);
}

function filterCluster(cl, btn) {
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = cl;
  buildTree(cl);
}

document.addEventListener('DOMContentLoaded', () => buildTree(0));
</script>
