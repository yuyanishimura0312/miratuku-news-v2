<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | miratuku-news</title>
<link rel="icon" href="https://esse-sense.com/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --card: #FFFFFF;
  --card-hover: #F7F7F5;
  --accent: #121212;
  --accent-soft: #555555;
  --accent-warm: #CC1400;
  --accent-warm-soft: #B01200;
  --accent-muted: rgba(204,20,0,0.06);
  --text: #121212;
  --text-secondary: #555555;
  --text-muted: #6B6B6B;
  --border: #D9D9D9;
  --border-light: #EEEEEE;
  --highlight: #CC1400;
  --surface: #F7F7F5;
  --font: "Noto Sans JP", "Hiragino Sans", -apple-system, sans-serif;
  --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", Georgia, serif;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #121212;
  --card: #1A1A1A;
  --card-hover: #222222;
  --accent: #E0E0E0;
  --accent-soft: #999999;
  --accent-warm: #FF4030;
  --accent-warm-soft: #FF6050;
  --accent-light: #1A1A1A;
  --accent-muted: rgba(255,64,48,0.10);
  --text: #E0E0E0;
  --text-secondary: #AAAAAA;
  --text-muted: #8A8A8A;
  --border: #333333;
  --border-light: #2A2A2A;
  --highlight: #FF4030;
  --surface: #1A1A1A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-serif);
  color: var(--text);
  background: var(--bg);
  line-height: 1.95;
  letter-spacing: 0.025em;
  font-feature-settings: "palt";
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}
a { color: var(--accent-warm); text-decoration: none; }
a:hover { text-decoration: underline; }

.top-bar {
  background: var(--bg);
  border-top: 3px solid var(--accent);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 48px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar-brand {
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.top-bar-brand span { color: var(--accent-warm); }
.top-bar-actions { display: flex; align-items: center; gap: 12px; }
.back-link {
  font-family: var(--font);
  font-size: 0.75rem;
  color: var(--text-muted);
}
.back-link:hover { color: var(--accent-warm); text-decoration: none; }
.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px 10px;
  font-size: 0.72rem;
  font-family: var(--font);
  letter-spacing: 0.05em;
  transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--accent-warm); color: var(--accent-warm); }

.book-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  gap: 0;
}
.toc-sidebar {
  position: sticky;
  top: 48px;
  height: calc(100vh - 48px);
  overflow-y: auto;
  padding: 40px 24px 40px 0;
  border-right: 1px solid var(--border-light);
}
.toc-sidebar::-webkit-scrollbar { width: 4px; }
.toc-sidebar::-webkit-scrollbar-thumb { background: var(--border); }
.toc-label {
  font-family: var(--font);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.toc-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.toc-list li a {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-family: var(--font);
  font-size: 0.75rem;
  color: var(--text-secondary);
  padding: 5px 8px 5px 0;
  transition: color 0.15s;
  line-height: 1.5;
}
.toc-list li a:hover { color: var(--accent-warm); text-decoration: none; }
.toc-num {
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 0.65rem;
  color: var(--accent-warm);
  min-width: 22px;
  flex-shrink: 0;
  font-weight: 700;
}

.book-main { padding: 60px 0 100px 48px; max-width: 760px; }

.book-header {
  margin-bottom: 64px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--border);
}
.book-db-tags {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.db-tag {
  font-family: var(--font);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.db-tag.primary { border-color: var(--accent-warm); color: var(--accent-warm); }
.book-title {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 16px;
  letter-spacing: 0;
}
.book-subtitle {
  font-family: var(--font-serif);
  font-size: 1.05rem;
  color: var(--text-secondary);
  font-weight: 400;
  line-height: 1.7;
}
.book-meta {
  margin-top: 32px;
  font-family: var(--font);
  font-size: 0.78rem;
  color: var(--text-muted);
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.chapter-section {
  margin-bottom: 80px;
  padding-bottom: 60px;
  border-bottom: 1px solid var(--border-light);
}
.chapter-section:last-child { border-bottom: none; }
.chapter-number-label {
  font-family: var(--font);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent-warm);
  margin-bottom: 12px;
  font-weight: 700;
}
.chapter-title {
  font-family: var(--font-serif);
  font-size: 1.7rem;
  line-height: 1.5;
  font-weight: 700;
  margin-bottom: 28px;
  letter-spacing: 0;
}
h3 {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  line-height: 1.6;
  font-weight: 600;
  margin: 48px 0 20px;
  color: var(--text);
}
h4 {
  font-family: var(--font);
  font-size: 0.95rem;
  font-weight: 700;
  margin: 32px 0 12px;
  color: var(--accent-warm);
}
p { margin-bottom: 24px; text-indent: 1em; }
p:first-of-type { text-indent: 0; }
.lead {
  font-size: 1.08rem;
  color: var(--text-secondary);
  margin-bottom: 40px;
  font-weight: 500;
  text-indent: 0;
}
ul, ol { margin: 16px 0 28px 1.6em; }
li { margin-bottom: 8px; }
strong { font-weight: 700; color: var(--text); }
em {
  font-style: normal;
  background: linear-gradient(transparent 60%, var(--accent-muted) 60%);
  padding: 0 2px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin: 32px 0;
  font-family: var(--font);
  font-size: 0.86rem;
  line-height: 1.6;
}
th, td {
  padding: 11px 13px;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
  vertical-align: top;
}
th { background: var(--surface); font-weight: 700; }

.callout {
  background: var(--surface);
  border-left: 3px solid var(--accent-warm);
  padding: 20px 24px;
  margin: 32px 0;
  font-family: var(--font);
  font-size: 0.92rem;
  line-height: 1.75;
}
.callout-title {
  font-weight: 700;
  color: var(--accent-warm);
  margin-bottom: 8px;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  margin: 32px 0;
}
.stat-box {
  padding: 20px;
  border: 1px solid var(--border);
  border-radius: 6px;
  text-align: center;
  font-family: var(--font);
  background: var(--card);
}
.stat-num {
  font-size: 1.7rem;
  font-weight: 700;
  color: var(--accent-warm);
  line-height: 1.2;
}
.stat-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 6px;
}

code {
  font-family: "SF Mono", Menlo, monospace;
  font-size: 0.85em;
  background: var(--surface);
  padding: 2px 6px;
  border-radius: 3px;
}
pre {
  background: var(--surface);
  padding: 16px 20px;
  border-radius: 6px;
  overflow-x: auto;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 0.82rem;
  line-height: 1.6;
  margin: 24px 0;
  border-left: 3px solid var(--accent-warm);
}
pre code { background: none; padding: 0; }

.bar { display: inline-block; height: 14px; background: var(--accent-warm); margin-right: 8px; vertical-align: middle; }
.high { color: #2e7d32; font-weight: 700; }
.low { color: var(--accent-warm); font-weight: 700; }

footer {
  margin-top: 80px;
  padding: 40px 0;
  border-top: 1px solid var(--border);
  font-family: var(--font);
  font-size: 0.8rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.7;
}
@media (max-width: 1000px) {
  .book-layout { grid-template-columns: 1fr; gap: 24px; padding: 0 16px; }
  .toc-sidebar {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border-light);
    padding: 24px 0;
  }
  .book-main { padding: 24px 0 60px; }
  .book-title { font-size: 1.6rem; }
  .chapter-title { font-size: 1.35rem; }
}
@media print {
  .top-bar, .toc-sidebar { display: none; }
  body { font-size: 11pt; }
  .book-layout { grid-template-columns: 1fr; }
  .book-main { padding: 0; }
}
</style>
</head>
<body>
<div class="top-bar">
<div class="top-bar-brand">MIRATUKU NEWS / <span>{{SECTION_LABEL}}</span></div>
<div class="top-bar-actions">
<a class="back-link" href="../databases.html">← Databases</a>
<button class="theme-toggle" onclick="toggleTheme()">DARK / LIGHT</button>
</div>
</div>

<div class="book-layout">
<nav class="toc-sidebar" aria-label="目次">
<div class="toc-label">CONTENTS</div>
<ol class="toc-list">
{{TOC_LIST}}
</ol>
</nav>

<main class="book-main">
<header class="book-header">
<div class="book-db-tags">{{TAGS}}</div>
<h1 class="book-title">{{TITLE}}</h1>
<p class="book-subtitle">{{SUBTITLE}}</p>
<div class="book-meta">{{META}}</div>
</header>

{{CHAPTERS}}

<footer>
{{FOOTER}}
</footer>
</main>
</div>

<script>
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
const saved = localStorage.getItem('theme');
if (saved) document.documentElement.setAttribute('data-theme', saved);
</script>
</body>
</html>
