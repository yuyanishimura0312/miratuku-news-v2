<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>戦略 | Insight News</title>
  <link rel="icon" href="https://esse-sense.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/shared/firebase-config.js"></script>
  <style>
    /* Sub-tab navigation */
    .strategy-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border, #d9d9d9);
      margin-bottom: 32px;
    }
    .strategy-tab {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .82rem;
      font-weight: 500;
      padding: 10px 24px;
      cursor: pointer;
      color: var(--text-secondary, #666);
      border-bottom: 2px solid transparent;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      transition: color .15s, border-color .15s;
    }
    .strategy-tab:hover {
      color: var(--text, #121212);
    }
    .strategy-tab.active {
      color: var(--text, #121212);
      border-bottom-color: var(--accent-warm, #CC1400);
      font-weight: 700;
    }
    .strategy-panel {
      display: none;
    }
    .strategy-panel.active {
      display: block;
    }
    .strategy-coming-soon {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted, #999);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .9rem;
    }
    .strategy-coming-soon h3 {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-secondary, #666);
      margin-bottom: 12px;
    }

    /* Report list (mirroring analysis-reports card style) */
    .str-report-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .str-report-card {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 20px;
      background: var(--card, #fff);
      border: 1px solid var(--border, #d9d9d9);
      text-decoration: none;
      color: inherit;
      transition: border-color .15s;
    }
    .str-report-card:hover {
      border-color: var(--accent-warm, #CC1400);
    }
    .str-report-date {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .68rem;
      color: var(--text-muted, #999);
      white-space: nowrap;
      min-width: 80px;
      padding-top: 2px;
    }
    .str-report-body {
      flex: 1;
    }
    .str-report-title {
      font-family: 'Noto Serif JP', serif;
      font-size: .95rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .str-report-desc {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .78rem;
      color: var(--text-secondary, #666);
      line-height: 1.6;
    }
    .str-report-tags {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .str-report-tag {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .65rem;
      padding: 2px 8px;
      border: 1px solid var(--border, #d9d9d9);
      color: var(--text-muted, #999);
    }
  </style>
</head>
<body>
  <div id="app-nav"></div>

  <main class="container">
    <section class="app-section">
      <div class="section-header">
        <h2 class="section-title">戦略</h2>
        <span class="section-subtitle">Strategic Planning &amp; Roadmap</span>
      </div>

      <!-- Sub-tabs -->
      <div class="strategy-tabs">
        <button class="strategy-tab active" data-panel="miratuku">ミラツク</button>
        <button class="strategy-tab" data-panel="esse-sense">esse-sense</button>
      </div>

      <!-- Panel: ミラツク -->
      <div class="strategy-panel active" id="panel-miratuku">
        <div class="str-report-list">
          <a href="reports/strategy-miratuku-2026-summer.html" class="str-report-card">
            <div class="str-report-date">2026-05-02</div>
            <div class="str-report-body">
              <div class="str-report-title">ミラツク戦略 2026夏 — データ駆動型未来洞察の社会実装</div>
              <div class="str-report-desc">3つの柱（データ駆動型シンクタンク/イノベーション・シンクタンク/未来を見るコミュニティ）の構築。連載・メンバーシップ・編集自動化・サイト改修・対外発信の統合戦略。</div>
              <div class="str-report-tags">
                <span class="str-report-tag">コミュニティ</span>
                <span class="str-report-tag">メンバーシップ</span>
                <span class="str-report-tag">データ駆動型</span>
                <span class="str-report-tag">連載</span>
                <span class="str-report-tag">方法論刷新</span>
              </div>
            </div>
          </a>
        </div>
      </div>

      <!-- Panel: esse-sense -->
      <div class="strategy-panel" id="panel-esse-sense">
        <div class="strategy-coming-soon">
          <h3>esse-sense 戦略</h3>
          <p>準備中</p>
        </div>
      </div>

    </section>
  </main>

  <div id="app-footer"></div>

  <script src="js/shared/utilities.js"></script>
  <script src="js/shared/auth-guard.js"></script>
  <script src="js/shared/nav.js"></script>
  <script>
    initNav('strategy');

    // Sub-tab switching
    document.querySelectorAll('.strategy-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.strategy-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.strategy-panel').forEach(function(p) { p.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById('panel-' + this.dataset.panel).classList.add('active');
      });
    });
  </script>
</body>
</html>
