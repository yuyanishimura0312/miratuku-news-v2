<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>データベース | Insight News</title>
  <link rel="icon" href="https://esse-sense.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/shared/firebase-config.js"></script>
</head>
<body>
  <div id="app-nav"></div>

  <main class="container">
    <section class="app-section">
      <div class="section-header">
        <h2 class="section-title">データベース</h2>
        <span class="section-subtitle">Intelligence Pipeline を支える22のデータソース</span>
      </div>
      <p style="font-size:0.84rem;color:var(--text-secondary);line-height:1.7;max-width:720px;margin-bottom:20px">
        ミラツク・インテリジェンス・パイプラインは、4つの層に分類されたデータベースで構成されています。基軸データベースが情報を蓄積し、構造理解が分析フレームを提供し、変化検出がセンサーとして機能し、概念基盤が知識の文脈を与えます。
      </p>
      <div style="margin-bottom:16px">
        <a href="analysis-reports.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent-warm);color:#fff;border-radius:6px;font-size:0.82rem;font-weight:600;text-decoration:none;transition:opacity 0.2s" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">解析レポート<span style="font-size:0.72rem;opacity:0.85">&rarr;</span></a>
      </div>
      <div class="db-overview" id="dbOverview"></div>
      <div class="db-arch-diagram">
        <div class="db-arch-stage" data-layer="conceptual">概念基盤<span class="db-arch-stage-sub">AK・MY・AN</span></div>
        <span class="db-arch-arrow">&rarr;</span>
        <div class="db-arch-stage" data-layer="core">基軸DB<span class="db-arch-stage-sub">FK・PE・CI・GR</span></div>
        <span class="db-arch-arrow">&rarr;</span>
        <div class="db-arch-stage" data-layer="structural">構造理解<span class="db-arch-stage-sub">CLA・MT・AL・GF</span></div>
        <span class="db-arch-arrow">&rarr;</span>
        <div class="db-arch-stage" data-layer="detection">変化検出<span class="db-arch-stage-sub">SG・IR・PD・SI・IC 他</span></div>
        <span class="db-arch-arrow">&rarr;</span>
        <div class="db-arch-stage db-arch-stage-output">Insight News</div>
      </div>
      <div id="dbLayersContent">
        <div class="loading-indicator"><div class="loading-spinner"></div><div>データベース情報を読み込み中...</div></div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="js/shared/utilities.js"></script>
  <script src="js/shared/auth-guard.js"></script>
  <script src="js/shared/nav.js"></script>
  <script src="js/pages/databases.js"></script>
</body>
</html>
