<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未来洞察 | Insight News</title>
  <link rel="icon" href="https://esse-sense.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/shared/firebase-config.js"></script>
</head>
<body>
  <div id="app-nav"></div>

  <main class="container">
    <section class="app-section">
      <div class="section-header">
        <h2 class="section-title">未来洞察</h2>
        <span class="section-subtitle">Future Insight</span>
      </div>
      <div class="insight-box">
        <h3 class="section-title">未来洞察エンジン</h3>
        <p class="insight-desc">あなたの問題意識や関心テーマを記述してください。蓄積されたPESTLEニュース、因果階層分析、弱いシグナルのデータを基に、未来洞察の視点から回答します。</p>
        <form id="insightForm">
          <textarea class="insight-textarea" placeholder="例: AI規制と労働市場の関係について、今後3-5年の見通しを知りたい..." id="insightText"></textarea>
          <div class="insight-form-actions">
            <button type="button" class="btn-secondary" onclick="document.getElementById('insightText').value=''">クリア</button>
            <button type="submit" class="btn-primary">洞察を投稿</button>
          </div>
        </form>
        <div id="foresightAnswer"></div>
      </div>
      <div style="margin-top:2rem">
        <h3 class="section-title">洞察履歴</h3>
        <p class="section-subtitle" style="margin-bottom:12px">過去の未来洞察の問いかけと応答</p>
        <div id="foresightHistoryContent">
          <div class="loading-indicator"><div class="loading-spinner"></div><div>読み込み中...</div></div>
        </div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="js/shared/utilities.js"></script>
  <script src="js/shared/data-cache.js"></script>
  <script src="js/shared/auth-guard.js"></script>
  <script src="js/shared/nav.js"></script>
  <script src="js/shared/article-modal.js"></script>
  <script src="js/pages/foresight.js"></script>
</body>
</html>
